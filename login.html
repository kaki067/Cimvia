<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Iniciar sesión | Cimva</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#contenido">Saltar al contenido</a>

    <header class="topbar">
      <div class="container topbar-inner">
        <a class="brand" href="index.html" aria-label="Inicio">
          <img class="brand-logo" src="assets/logo.png" alt="Cimva" onerror="if(!this.dataset.fallback){this.dataset.fallback='1';this.src='assets/Logo.png';}else{this.hidden=true;}" />
          <span class="brand-badge" aria-hidden="true"></span>
          <span>
            Cimva
            <small>Acceso</small>
          </span>
        </a>
        <nav class="nav" aria-label="Navegación principal">
          <a href="index.html">Inicio</a>
          <a href="servicios.html">Servicios</a>
          <a href="contacto.html">Contacto</a>
          <button class="btn theme-toggle" type="button" data-theme-toggle aria-pressed="false">Oscuro</button>
        </nav>
      </div>
    </header>

    <main id="contenido" class="section">
      <div class="container">
        <form class="form" data-login-form>
          <h1>Inicia sesión</h1>
          <p class="hint">Accede al panel manteniendo el estilo del sitio.</p>

          <div class="field">
            <label for="email">Correo</label>
            <input id="email" name="email" type="email" autocomplete="email" placeholder="tu@email.com" required />
          </div>

          <div class="field">
            <label for="password">Contraseña</label>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••" required />
          </div>

          <div class="error" data-error aria-hidden="true" role="alert"></div>

          <div class="form-actions">
            <button class="btn btn-primary" type="submit">Entrar</button>
            <a class="btn" href="index.html">Volver</a>
          </div>
        </form>
      </div>
    </main>

    <footer class="footer">
      <div class="container footer-grid">
        <div>© <span id="year"></span> Cimva</div>
        <div class="nav" aria-label="Enlaces del pie">
          <a href="sobre.html">Sobre</a>
          <a href="servicios.html">Servicios</a>
          <a href="contacto.html">Contacto</a>
          <a href="privacidad.html">Privacidad</a>
          <a href="cookies.html">Cookies</a>
        </div>
      </div>
    </footer>

    <div class="cookie-banner" data-cookie-banner aria-hidden="true">
      <div class="cookie-inner">
        <div class="cookie-text">
          <strong>Cookies</strong>
          <span>
            Usamos cookies para recordar preferencias y mejorar la experiencia. Puedes aceptar o rechazar.
            <a href="cookies.html">Ver política</a>
          </span>
        </div>
        <div class="cookie-actions">
          <button class="btn" type="button" data-cookie-reject>Rechazar</button>
          <button class="btn btn-primary" type="button" data-cookie-accept>Aceptar</button>
        </div>
      </div>
    </div>

    <script src="js/app.js"></script>
    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
